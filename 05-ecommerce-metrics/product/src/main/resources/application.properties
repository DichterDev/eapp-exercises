spring.application.name=product

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/product_db
spring.datasource.username=myuser
spring.datasource.password=secret

server.port=8082
spring.jpa.hibernate.ddl-auto=update

management.endpoints.web.exposure.include=health,prometheus
management.metrics.tags.application=${spring.application.name}
management.endpoint.health.show-details=always

spring.cloud.stream.default-binder=kafka
spring.cloud.stream.kafka.binder.brokers=${KAFKA_SERVER_URL:localhost:9092}

spring.cloud.stream.bindings.kafka-product-event-out-0.destination=product.events.topic
spring.cloud.stream.bindings.kafka-product-event-out-0.content-type=application/json

spring.cloud.stream.bindings.kafka-product-reduced-out-0.destination=product.reduced.topic
spring.cloud.stream.bindings.kafka-product-reduced-out-0.content-type=application/json

spring.cloud.stream.bindings.kafka-product-failed-out-0.destination=product.failed.topic
spring.cloud.stream.bindings.kafka-product-failed-out-0.content-type=application/json

spring.cloud.function.definition=orderPlacedIn

spring.cloud.stream.bindings.orderPlacedIn-in-0.destination=order.placed.topic
spring.cloud.stream.bindings.orderPlacedIn-in-0.group=product-order-group


eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8167/eureka/}
eureka.instance.prefer-ip-address=true
