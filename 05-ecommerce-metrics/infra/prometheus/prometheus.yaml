global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "ecommerce-apps"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          [
            "gateway-service:8080",
            "order-service:8081",
            "product-service:8082",
            "user-service:8083",
          ]
