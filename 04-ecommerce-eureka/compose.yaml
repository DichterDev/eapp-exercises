services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data

  discovery-service:
    image: eclipse-temurin:21-jre-alpine
    container_name: discovery-service
    ports:
      - "8167:8167"
    volumes:
      - ./discovery/build/libs/discovery-0.0.1-SNAPSHOT.jar:/app/service.jar
    command: "java -jar /app/service.jar"
    init: true
    depends_on:
      - postgres
      - kafka
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
    environment:
      - EUREKA_HOSTNAME=discovery-service

  user-service:
    image: eclipse-temurin:21-jre-alpine
    container_name: user-service
    ports:
      - "8083:8083"
    volumes:
      - ./user/build/libs/user-0.0.1-SNAPSHOT.jar:/app/service.jar
    command: "java -jar /app/service.jar"
    init: true
    depends_on:
      - postgres
      - kafka
      - discovery-service
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
    environment:
      - POSTGRES_HOST=progres
      - KAFKA_SERVER_URL=kafka:9092
      - EUREKA_SERVER_URL=http://discovery-service:8167/eureka

  product-service:
    image: eclipse-temurin:21-jre-alpine
    container_name: product-service
    ports:
      - "8082:8082"
    volumes:
      - ./product/build/libs/product-0.0.1-SNAPSHOT.jar:/app/service.jar
    command: "java -jar /app/service.jar"
    init: true
    depends_on:
      - postgres
      - kafka
      - discovery-service
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
    environment:
      - POSTGRES_HOST=progres
      - KAFKA_SERVER_URL=kafka:9092
      - EUREKA_SERVER_URL=http://discovery-service:8167/eureka

  order-service:
    image: eclipse-temurin:21-jre-alpine
    container_name: order-service
    ports:
      - "8081:8081"
    volumes:
      - ./order/build/libs/order-0.0.1-SNAPSHOT.jar:/app/service.jar
    command: "java -jar /app/service.jar"
    init: true
    depends_on:
      - postgres
      - kafka
      - discovery-service
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
    environment:
      - POSTGRES_HOST=progres
      - KAFKA_SERVER_URL=kafka:9092
      - EUREKA_SERVER_URL=http://discovery-service:8167/eureka

  gateway-service:
    image: eclipse-temurin:21-jre-alpine
    container_name: gateway-service
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/build/libs/gateway-0.0.1-SNAPSHOT.jar:/app/service.jar
    command: "java -jar /app/service.jar"
    init: true
    depends_on:
      - postgres
      - kafka
      - discovery-service
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
    environment:
      - KAFKA_SERVER_URL=kafka:9092
      - EUREKA_SERVER_URL=http://discovery-service:8167/eureka

volumes:
  kafka_data:
